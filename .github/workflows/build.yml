name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build ReplayMod 1.21.6
        run: ./gradlew :1.21.6:build --parallel --no-daemon

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: replaymod-jars
          path: versions/*/build/libs/*.jar
